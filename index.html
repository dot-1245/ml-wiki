<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiLight Server 公式Wiki</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
            --fandom-bg: #191919; 
            --at-wiki-content-bg: #ffffff;
            --fandom-blue: #00d6d6;
            --sidebar-width: 280px;
            --header-height: 60px;
        }

        body {
            margin: 0; font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--fandom-bg);
            color: #333; overflow-x: hidden;
        }

        /* ヘッダー */
        header {
            height: var(--header-height); background: #2a2f35; color: white;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; position: sticky; top: 0; z-index: 2000;
            border-bottom: 3px solid var(--fandom-blue);
        }

        .header-left { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .logo { display: flex; align-items: center; gap: 5px; font-weight: bold; color: var(--fandom-blue); text-decoration: none; font-size: 1rem; }

        #menu-toggle { background: none; border: none; color: white; cursor: pointer; padding: 5px; display: none; }

        /* 検索バー */
        .search-container { position: relative; width: 220px; flex-shrink: 1; margin-left: 10px; }
        .search-box {
            width: 100%; background: rgba(255,255,255,0.1); border: 1px solid #444;
            border-radius: 4px; padding: 7px 10px 7px 35px; color: white; outline: none; 
            font-family: inherit; font-size: 14px; box-sizing: border-box;
        }
        #search-results {
            position: absolute; top: 100%; right: 0; width: 100%; min-width: 200px;
            background: white; box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            border-radius: 0 0 4px 4px; display: none; z-index: 2001;
        }
        .search-item { padding: 12px; border-bottom: 1px solid #eee; text-decoration: none; color: #333; display: block; font-size: 0.9em; }

        /* レイアウト */
        .wrapper { display: flex; max-width: 1440px; margin: 0 auto; }

        /* サイドバー */
        nav {
            width: var(--sidebar-width); background: #fff; padding: 20px;
            border-right: 1px solid #ddd; flex-shrink: 0; display: flex; flex-direction: column;
            transition: transform 0.3s ease; box-sizing: border-box;
        }
        nav h3 { font-size: 0.8em; color: #888; border-bottom: 1px solid #eee; margin: 25px 0 10px 0; }
        nav ul { list-style: none; padding: 0; margin: 0; }
        nav li a { text-decoration: none; color: #0066c0; display: block; padding: 8px 10px; font-size: 0.9em; }

        /* メインコンテンツ */
        main { flex: 1; background: var(--at-wiki-content-bg); padding: 40px; min-width: 0; min-height: 100vh; box-sizing: border-box; }

        /* 広告枠のスタイル */
        .ad-box { text-align: center; margin: 20px 0; padding: 10px; background: #fafafa; border: 1px solid #eee; }
        .ad-label { font-size: 10px; color: #ccc; display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .ad-sidebar { margin-top: auto; padding-top: 20px; border-top: 1px solid #eee; }

        @media (max-width: 900px) {
            #menu-toggle { display: block; }
            .logo span:not(.material-symbols-outlined) { display: none; }
            nav {
                position: fixed; top: var(--header-height); left: 0;
                height: calc(100vh - var(--header-height));
                z-index: 1500; transform: translateX(-100%);
            }
            nav.open { transform: translateX(0); }
            .search-container { width: 160px; }
            main { padding: 20px; }
        }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1400; }
        #overlay.show { display: block; }

        .error-container { text-align: center; padding: 60px 20px; color: #666; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <button id="menu-toggle"><span class="material-symbols-outlined">menu</span></button>
        <a href="#home" class="logo">
            <span class="material-symbols-outlined">shield</span>
            <span>MiLight Server 公式Wiki</span>
        </a>
    </div>
    <div class="search-container">
        <span class="material-symbols-outlined" style="position:absolute; left:8px; top:50%; transform:translateY(-50%); color:#888; font-size:1.1rem;">search</span>
        <input type="text" id="search-input" class="search-box" placeholder="検索...">
        <div id="search-results"></div>
    </div>
</header>

<div id="overlay"></div>

<div class="wrapper">
    <nav id="sidebar">
        <div id="sidebar-nav" style="flex-grow:1;"></div>

        <div class="ad-box ad-sidebar">
            <span class="ad-label">広告</span>
            <!-- admax -->
            <script src="https://adm.shinobi.jp/o/daba29522a811c8f83b60fcc4e941252"></script>
            <!-- admax -->
        </div>
    </nav>

    <main>
        <div class="ad-box">
            <span class="ad-label">広告</span>
            <!-- admax -->
            <script src="https://adm.shinobi.jp/o/ae858bf51ea81ba7e5d8c491dbc3d627"></script>
            <!-- admax -->
        </div>

        <article id="wiki-view">読み込み中...</article>

        <div class="ad-box" style="margin-top: 50px;">
            <span class="ad-label">広告</span>
            <!-- admax -->
            <script src="https://adm.shinobi.jp/o/c46bde92c74eb42870fd774106ebaae8"></script>
            <!-- admax -->
        </div>
    </main>
</div>

<script>
    let wikiIndex = [];
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');

    function toggleMenu() {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('show');
    }

    document.getElementById('menu-toggle').onclick = toggleMenu;
    overlay.onclick = toggleMenu;

    async function initWiki() {
        try {
            const resIndex = await fetch(`./wikipageslist.json?t=${Date.now()}`);
            wikiIndex = await resIndex.json();
            const resMenu = await fetch(`./sidemenu.json?t=${Date.now()}`);
            const menuData = await resMenu.json();
            
            const nav = document.getElementById('sidebar-nav');
            nav.innerHTML = ''; 
            menuData.forEach(section => {
                const h3 = document.createElement('h3');
                h3.innerText = section.category;
                nav.appendChild(h3);
                const ul = document.createElement('ul');
                section.links.forEach(link => {
                    const li = document.createElement('li');
                    li.innerHTML = `<a href="#${link.id}">${link.text}</a>`;
                    li.onclick = () => { if(window.innerWidth <= 900) toggleMenu(); };
                    ul.appendChild(li);
                });
                nav.appendChild(ul);
            });
            updateContent(); 
        } catch (e) { updateContent(); }
    }

    async function updateContent() {
        const view = document.getElementById('wiki-view');
        const hash = window.location.hash.replace('#', '') || 'home';

        try {
            const response = await fetch(`./pages/${hash}.md?t=${Date.now()}`);
            if (!response.ok) throw new Error();
            const contentType = response.headers.get("content-type");
            if (contentType && contentType.includes("text/html")) throw new Error();

            let text = await response.text();
            if (text.trim().startsWith('<')) throw new Error();

            if (text.trim().startsWith("TITLE:")) {
                const lines = text.split('\n');
                document.title = lines[0].replace("TITLE:", "").trim();
                text = lines.slice(1).join('\n');
            } else {
                document.title = "Server Official Wiki";
            }

            view.innerHTML = marked.parse(text);
            document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
            window.scrollTo(0, 0);
        } catch (e) {
            view.innerHTML = `<div class="error-container"><h1>404</h1><p>ページが見つかりませんでした。</p><a href="#home">ホームへ戻る</a></div>`;
        }
    }

    const sInput = document.getElementById('search-input');
    const sResults = document.getElementById('search-results');
    sInput.oninput = () => {
        const val = sInput.value.toLowerCase();
        sResults.innerHTML = '';
        if(!val) { sResults.style.display='none'; return; }
        const matches = wikiIndex.filter(i => i.title.toLowerCase().includes(val));
        if (matches.length > 0) {
            matches.forEach(m => {
                const a = document.createElement('a');
                a.href = `#${m.id}`; a.className = 'search-item'; a.innerText = m.title;
                a.onclick = () => { sResults.style.display='none'; sInput.value=''; if(window.innerWidth <= 900) toggleMenu(); };
                sResults.appendChild(a);
            });
            sResults.style.display = 'block';
        } else {
            sResults.innerHTML = '<div style="padding:10px; color:#999; font-size:0.8em;">該当なし</div>';
            sResults.style.display = 'block';
        }
    };

    window.onhashchange = updateContent;
    window.onload = initWiki;
</script>
</body>
</html>
