<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Official Wiki</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
            --fandom-bg: #191919;
            --at-wiki-content-bg: #ffffff;
            --fandom-blue: #00d6d6;
            --sidebar-width: 260px;
            --header-height: 56px;
        }

        body {
            margin: 0;
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--fandom-bg);
            color: #333;
            line-height: 1.6;
        }

        /* ヘッダー */
        header {
            height: var(--header-height);
            background: #2a2f35;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 3px solid var(--fandom-blue);
        }

        .logo { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 1.2em; color: var(--fandom-blue); text-decoration: none; }
        .material-symbols-outlined { vertical-align: middle; }

        /* 検索バー */
        .search-container { position: relative; width: 300px; }
        .search-box {
            width: 100%; background: rgba(255,255,255,0.1); border: 1px solid #444;
            border-radius: 4px; padding: 7px 10px 7px 35px; color: white; outline: none; font-family: inherit;
        }
        .search-box:focus { background: rgba(255,255,255,0.15); border-color: var(--fandom-blue); }
        .search-icon { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: #888; font-size: 1.2rem; }
        
        #search-results {
            position: absolute; top: 100%; left: 0; width: 100%;
            background: white; box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            border-radius: 0 0 4px 4px; display: none; z-index: 1001;
        }
        .search-item { padding: 12px; border-bottom: 1px solid #eee; text-decoration: none; color: #333; display: block; font-size: 0.9em; }
        .search-item:hover { background: #f0f2f5; }

        /* レイアウト */
        .wrapper { display: flex; max-width: 1440px; margin: 0 auto; }

        /* サイドバー */
        nav {
            width: var(--sidebar-width);
            background: #fff;
            min-height: calc(100vh - var(--header-height));
            padding: 20px;
            border-right: 1px solid #ddd;
            flex-shrink: 0;
            box-sizing: border-box;
        }
        nav h3 { 
            font-size: 0.85em; color: #888; border-bottom: 1px solid #eee; 
            padding-bottom: 5px; margin: 25px 0 10px 0; 
            display: flex; align-items: center; gap: 6px;
        }
        nav h3:first-child { margin-top: 0; }
        nav ul { list-style: none; padding: 0; margin: 0; }
        nav li a { 
            text-decoration: none; color: #0066c0; display: block;
            padding: 7px 10px; font-size: 0.9em; border-radius: 4px;
        }
        nav li a:hover { background: #eef9f9; }

        /* メイン */
        main { flex: 1; background: var(--at-wiki-content-bg); padding: 40px 60px; min-width: 0; }
        #wiki-view h1 { font-size: 2.2em; border-bottom: 4px solid #333; padding-bottom: 10px; margin-top: 0; }
        #wiki-view h2 { border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-top: 35px; border-left: 8px solid var(--fandom-blue); padding-left: 15px; }

        pre { background: #1e1e1e; padding: 20px; border-radius: 8px; overflow-x: auto; }
        code { font-family: 'Consolas', monospace; background: #f4f4f4; padding: 2px 4px; border-radius: 4px; color: #d63384; }
        pre code { background: none; color: inherit; padding: 0; }

        /* 404画面 */
        .error-container { text-align: center; padding: 80px 20px; color: #666; }
        .big-icon { font-size: 5rem; color: #ffcc00; margin-bottom: 20px; }

        @media (max-width: 900px) {
            .wrapper { flex-direction: column; }
            nav { width: 100%; min-height: auto; border-right: none; border-bottom: 1px solid #ddd; }
            main { padding: 30px 20px; }
        }
    </style>
</head>
<body>

<header>
    <a href="#home" class="logo">
        <span class="material-symbols-outlined">shield</span>
        <span>SERVER WIKI</span>
    </a>
    <div class="search-container">
        <span class="material-symbols-outlined search-icon">search</span>
        <input type="text" id="search-input" class="search-box" placeholder="Wiki内を検索...">
        <div id="search-results"></div>
    </div>
</header>

<div class="wrapper">
    <nav id="sidebar-nav">
        <p style="font-size: 0.8em; color: #999;">メニューを読み込み中...</p>
    </nav>

    <main>
        <article id="wiki-view">
            <p>準備中...</p>
        </article>
    </main>
</div>

<script>
    let wikiIndex = [];

    // 初期化: JSON読み込み & メニュー生成
    async function initWiki() {
        try {
            // 1. 全ページ名簿(検索用)の取得
            const resIndex = await fetch('./wikipageslist.json');
            wikiIndex = await resIndex.json();

            // 2. メニュー構成の取得
            const resMenu = await fetch('./sidemenu.json');
            const menuData = await resMenu.json();
            
            // 3. サイドメニューのHTML生成
            const nav = document.getElementById('sidebar-nav');
            nav.innerHTML = ''; 
            menuData.forEach(section => {
                const h3 = document.createElement('h3');
                h3.innerHTML = `<span class="material-symbols-outlined">list_alt</span> ${section.category}`;
                nav.appendChild(h3);

                const ul = document.createElement('ul');
                section.links.forEach(link => {
                    const li = document.createElement('li');
                    li.innerHTML = `<a href="#${link.id}">${link.text}</a>`;
                    ul.appendChild(li);
                });
                nav.appendChild(ul);
            });

            updateContent(); 
        } catch (e) {
            console.error("Setup error:", e);
            updateContent();
        }
    }

    // 記事の読み込みと表示
    async function updateContent() {
        const view = document.getElementById('wiki-view');
        const hash = window.location.hash.replace('#', '') || 'home';
        view.innerHTML = '<p>読み込み中...</p>';

        try {
            const response = await fetch(`./pages/${hash}.md`);
            if (!response.ok) throw new Error('NOT_FOUND');
            
            const contentType = response.headers.get("content-type");
            if (contentType && contentType.includes("text/html")) throw new Error('HTML_RETURNED');

            const md = await response.text();
            view.innerHTML = marked.parse(md);
            
            document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
            window.scrollTo(0, 0);

        } catch (e) {
            view.innerHTML = `
                <div class="error-container">
                    <span class="material-symbols-outlined big-icon">warning</span>
                    <h1>404 Not Found</h1>
                    <p>ページ「${hash}」は見つかりませんでした。</p>
                    <a href="#home" style="color:var(--fandom-blue); font-weight:bold; text-decoration:none;">ホームに戻る</a>
                </div>`;
        }
    }

    // 検索機能
    const sInput = document.getElementById('search-input');
    const sResults = document.getElementById('search-results');

    sInput.oninput = () => {
        const val = sInput.value.toLowerCase();
        sResults.innerHTML = '';
        if(!val) { sResults.style.display='none'; return; }

        const matches = wikiIndex.filter(i => 
            i.title.toLowerCase().includes(val) || 
            (i.tags && i.tags.toLowerCase().includes(val))
        );

        matches.forEach(m => {
            const a = document.createElement('a');
            a.href = `#${m.id}`;
            a.className = 'search-item';
            a.innerText = m.title;
            a.onclick = () => { sResults.style.display='none'; sInput.value=''; };
            sResults.appendChild(a);
        });
        sResults.style.display = matches.length ? 'block' : 'none';
    };

    window.onhashchange = updateContent;
    window.onload = initWiki;
</script>
</body>
</html>
